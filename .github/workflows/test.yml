    env:
      MATRIX_OS: ${{ matrix.os }}

    steps:
    - name: Set up libraries
      uses: actions/cache@v2
      with:
        path: ~/svn
        key: ${{ runner.os }}-${{ github.sha }}

    - name: Set up Perl ${{ matrix.perl-version }}
      uses: shogo82148/actions-setup-perl@v1
