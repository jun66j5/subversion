        perl-version: ${{ matrix.perl-version }}

    - name: Checkout
      uses: actions/checkout@v2

    - name: Build and run tests
      run: |
        set -x

        ldflags="-L$HOME/svn/lib -Wl,-rpath,$HOME/svn/lib"
        case "$MATRIX_OS" in
          ubuntu-*)
            sudo apt-get install -qq -y libapr1-dev libaprutil1-dev liblz4-dev libutf8proc-dev swig
            with_apr=/usr/bin/apr-1-config
            with_apr_util=/usr/bin/apu-1-config
            with_swig=/usr/bin/swig
            ;;
          macos-*)
            brew update
            brew install apr apr-util lz4 utf8proc swig
            with_apr="$(brew --prefix apr)/libexec/bin/apr-1-config"
            with_apr_util="$(brew --prefix apr-util)/libexec/bin/apu-1-config"
            with_swig="$(brew --prefix swig)/bin/swig"
            ;;
        esac

        PATH="$HOME/svn/bin:$PATH"
        export PATH
        /bin/sh autogen.sh
        mkdir -p subversion/bindings/swig/proxy || :
        installed_libs="$(cd "$HOME/svn/lib" && \
                          echo libsvn_*.la | \
                          sed -e 's/-[^-]*\.la//g; s/ /,/g')"
        python gen-make.py --installed-libs="$installed_libs"
        ./configure --prefix="$HOME/svn" \
                    --with-apr="$with_apr" \
                    --with-apr-util="$with_apr_util" \
                    --with-swig="$with_swig" \
                    --without-py3c \
                    --without-jdk \
                    --without-junit \
                    --without-apxs \
                    --without-doxygen \
                    --without-berkeley-db \
                    --without-gpg-agent \
                    --without-gnome-keyring \
                    --without-kwallet \
                    LDFLAGS="$ldflags"
        make -j3 swig-pl
        make check-swig-pl

    - name: Upload log files
      uses: actions/upload-artifact@v2
      if: always()
      with:
        name: log-perl-${{ matrix.perl-version }}-${{ matrix.os }}
        path: '*.log'


  posix-test-javahl:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        java-version: ['15', '11', '8']

    needs: posix-prepare

    env:
      MATRIX_OS: ${{ matrix.os }}

    steps:
    - name: Set up libraries
      uses: actions/cache@v2
      with:
        path: ~/svn
        key: ${{ runner.os }}-${{ github.sha }}

    - name: Set up Java ${{ matrix.java-version }}
      uses: actions/setup-java@v2
      with:
        distribution: adopt
        java-version: ${{ matrix.java-version }}

    - name: Checkout
      uses: actions/checkout@v2

    - name: Build and run tests
      run: |
        set -x

        ldflags="-L$HOME/svn/lib -Wl,-rpath,$HOME/svn/lib"
        case "$MATRIX_OS" in
          ubuntu-*)
            sudo apt-get install -qq -y libapr1-dev libaprutil1-dev liblz4-dev libutf8proc-dev
            with_apr=/usr/bin/apr-1-config
            with_apr_util=/usr/bin/apu-1-config
            ;;
          macos-*)
            brew update
            brew install apr apr-util lz4 utf8proc
            with_apr="$(brew --prefix apr)/libexec/bin/apr-1-config"
            with_apr_util="$(brew --prefix apr-util)/libexec/bin/apu-1-config"
            ;;
        esac
        curl -L -o junit4.jar 'https://search.maven.org/remotecontent?filepath=junit/junit/4.13.2/junit-4.13.2.jar'

        PATH="$HOME/svn/bin:$PATH"
        export PATH
        /bin/sh autogen.sh
        installed_libs="$(cd "$HOME/svn/lib" && \
                          echo libsvn_*.la | \
                          sed -e 's/-[^-]*\.la//g; s/ /,/g')"
        python gen-make.py --with-jdk="$JAVA_HOME" \
                           --with-junit="$PWD/junit4.jar" \
                           --installed-libs="$installed_libs"
        ./configure --prefix="$HOME/svn" \
                    --enable-javahl \
                    --with-apr="$with_apr" \
                    --with-apr-util="$with_apr_util" \
                    --with-jdk="$JAVA_HOME" \
                    --with-junit="$PWD/junit4.jar" \
                    --without-swig \
                    --without-py3c \
                    --without-apxs \
                    --without-doxygen \
                    --without-berkeley-db \
                    --without-gpg-agent \
                    --without-gnome-keyring \
                    --without-kwallet \
                    LDFLAGS="$ldflags"
        make javahl check-javahl

    - name: Upload log files
      uses: actions/upload-artifact@v2
      if: always()
      with:
        name: log-javahl-${{ matrix.java-version }}-${{ matrix.os }}
        path: '*.log'


  posix-test-core:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    env:
      MATRIX_OS: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Build and run tests
      run: |
        set -x

        ldflags="-L$HOME/svn/lib -Wl,-rpath,$HOME/svn/lib"
        case "$MATRIX_OS" in
          ubuntu-*)
            sudo apt-get update -qq
            sudo apt-get install -qq -y apache2-dev libapr1-dev libaprutil1-dev liblz4-dev libutf8proc-dev libserf-dev
            with_apr=/usr/bin/apr-1-config
            with_apr_util=/usr/bin/apu-1-config
            with_apxs=/usr/bin/apxs2
            ;;
          macos-*)
            brew update
            brew install httpd apr apr-util lz4 utf8proc
            with_apr="$(brew --prefix apr)/libexec/bin/apr-1-config"
            with_apr_util="$(brew --prefix apr-util)/libexec/bin/apu-1-config"
            with_apxs="$(brew --prefix httpd)/bin/apxs"
            ;;
        esac

        /bin/sh autogen.sh
        ./configure --prefix="$HOME/svn" \
                    --with-apr="$with_apr" \
                    --with-apr-util="$with_apr_util" \
                    --with-apxs="$with_apxs" \
                    --without-swig \
                    --without-py3c \
                    --without-jdk \
                    --without-junit \
                    --without-doxygen \
                    --without-berkeley-db \
                    --without-gpg-agent \
                    --without-gnome-keyring \
                    --without-kwallet \
                    LDFLAGS="$ldflags"
        make -j3 all
        make check PARALLEL=3

    - name: Upload log files
      uses: actions/upload-artifact@v2
      if: always()
      with:
        name: log-core-${{ matrix.os }}
        path: '*.log'


  posix-prepare:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    env:
      MATRIX_OS: ${{ matrix.os }}

    steps:
    - name: Set up libraries
      uses: actions/cache@v2
      with:
        path: ~/svn
        key: ${{ runner.os }}-${{ github.sha }}

    - name: Checkout
      uses: actions/checkout@v2

    - name: Build and install
      run: |
        set -x
        case "$MATRIX_OS" in
          ubuntu-*)
            sudo apt-get update -qq
            sudo apt-get install -qq -y apache2-dev libapr1-dev libaprutil1-dev liblz4-dev libutf8proc-dev
            with_apr=/usr/bin/apr-1-config
            with_apr_util=/usr/bin/apu-1-config
            ;;
          macos-*)
            brew update
            brew install httpd apr apr-util lz4 utf8proc
            with_apr="$(brew --prefix apr)/libexec/bin/apr-1-config"
            with_apr_util="$(brew --prefix apr-util)/libexec/bin/apu-1-config"
            ;;
        esac

        /bin/sh autogen.sh
        ./configure --prefix="$HOME/svn" \
                    --with-apr="$with_apr" \
                    --with-apr-util="$with_apr_util" \
                    --without-apxs \
                    --without-swig \
                    --without-py3c \
                    --without-jdk \
                    --without-junit \
                    --without-doxygen \
                    --without-berkeley-db \
                    --without-gpg-agent \
                    --without-gnome-keyring \
                    --without-kwallet
        make -j3 all
        make install


  windows-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        architecture: [x64]
        python-version: ['3.9']
        perl-version: ['5.32']
        java-version: ['15']

    needs: windows-prepare

    env:
      MATRIX_ARCH: ${{ matrix.architecture }}

    defaults:
      run:
        shell: pwsh

    steps:
    - name: Set up vcpkg cache
      uses: actions/cache@v2
      with:
        path: ~\AppData\Local\vcpkg\archives
        key: ${{ runner.os }}-${{ matrix.architecture }}-vcpkg

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Perl ${{ matrix.perl-version }}
      uses: shogo82148/actions-setup-perl@v1
      with:
        perl-version: ${{ matrix.perl-version }}

    - name: Set up Java ${{ matrix.java-version }}
      uses: actions/setup-java@v2
      with:
        distribution: adopt
        java-version: ${{ matrix.java-version }}

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Set git to use LF
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf

    - name: Checkout
      uses: actions/checkout@v2

    - name: Checkout py3c
      uses: actions/checkout@v2
      with:
        repository: encukou/py3c
        ref: 'v1.3.1'
        path: py3c

    - name: Build and run tests
      run: |
        $LocalAppData = $env:LocalAppData
        $ProgramData = $env:ProgramData
        $workspace = $env:GITHUB_WORKSPACE
        $arch = $env:MATRIX_ARCH
        $pythonLocation = $env:pythonLocation
        $vcpkg_root = 'C:\vcpkg'
        $vcpkg_triplet = "$arch-windows"
        $vcpkg_dir = "$vcpkg_root\installed\$vcpkg_triplet"
        $sqlite_name = 'sqlite-amalgamation-3081101'
        $sqlite_url = "https://www.sqlite.org/2015/$sqlite_name.zip"
        $sqlite_arc = "$workspace\$sqlite_name.zip"
        $java_home = $env:JAVA_HOME
        $junit_url = 'https://search.maven.org/remotecontent?filepath=junit/junit/4.13.2/junit-4.13.2.jar'
        $junit_file = "$workspace\junit4.jar"
        $python = "$pythonLocation\python.exe"

        & choco install -y --no-progress swig
        & vcpkg install "--triplet=$vcpkg_triplet" apr apr-util zlib gettext
        Invoke-WebRequest -Uri $sqlite_url -OutFile $sqlite_arc
        Expand-Archive -LiteralPath $sqlite_arc -DestinationPath "$workspace"
        Invoke-WebRequest -Uri $junit_url -OutFile $junit_file

        New-Item -Force -ItemType Directory `
                 -Path "subversion\bindings\swig\proxy"
        $rc = 0
        & $python gen-make.py `
                  --vsnet-version=2019 `
                  --enable-nls `
                  "--with-apr=$vcpkg_dir" `
                  "--with-apr-util=$vcpkg_dir" `
                  "--with-zlib=$vcpkg_dir" `
                  "--with-libintl=$vcpkg_dir" `
                  "--with-sqlite=$workspace\$sqlite_name" `
                  "--with-swig=$ProgramData\chocolatey\bin" `
                  "--with-py3c=$workspace\py3c" `
                  "--with-jdk=$java_home" `
                  "--with-junit=$junit_file"
        & msbuild subversion_vcnet.sln `
                  /nologo /v:q /m:3 /fl /flp:logfile=msbuild.log `
                  "/t:__MORE__;__SWIG_PYTHON__;__SWIG_PERL__;__JAVAHL__;__JAVAHL_TESTS__" `
                  "/p:Configuration=Release;Platform=$arch"
        if (-not $?) {
          Write-Warning "Exited with $LASTEXITCODE"
          $rc = 1
        }
        $env:PATH = "$vcpkg_dir\bin;$($env:PATH)"
        foreach ($args in @('--parallel',
                            '--swig=python',
                            '--swig=perl',
                            '--javahl'))
        {
          & $python win-tests.py -cr $args
          if (-not $?) {
            Write-Warning "Exited with $LASTEXITCODE"
            $rc = 1
          }
        }
        $host.SetShouldExit($rc)

    - name: Upload log files
      uses: actions/upload-artifact@v2
      if: always()
      with:
        name: log-${{ matrix.os }}
        path: |
          *.log
          Release\*.log


  windows-prepare:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest]
        architecture: [x64]

    env:
      MATRIX_ARCH: ${{ matrix.architecture }}

    defaults:
      run:
        shell: pwsh

    steps:
    - name: Set up vcpkg cache
      uses: actions/cache@v2
      with:
        path: ~\AppData\Local\vcpkg\archives
        key: ${{ runner.os }}-${{ matrix.architecture }}-vcpkg
        restore-keys: |
          ${{ runner.os }}-${{ matrix.architecture }}-vcpkg-${{ github.sha }}
          ${{ runner.os }}-${{ matrix.architecture }}-vcpkg

    - name: Install dependencies
      run: |
        $arch = $env:MATRIX_ARCH
        $vcpkg_root = 'C:\vcpkg'
        $vcpkg_triplet = "$arch-windows"
        $vcpkg_dir = "$vcpkg_root\installed\$vcpkg_triplet"
        & vcpkg install "--triplet=$vcpkg_triplet" apr apr-util zlib gettext
