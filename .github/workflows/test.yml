name: test

on:
  push:
    branches: ['**']

jobs:

  posix-test-python:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.8', '3.7', '3.6', '3.5', '2.7']

    needs: posix-prepare

    env:
      MATRIX_OS: ${{ matrix.os }}
      MATRIX_PYVER: ${{ matrix.python-version }}

    steps:
    - name: Set up libraries
      uses: actions/cache@v2
      with:
        path: ~/svn
        key: ${{ runner.os }}-${{ github.sha }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}

    - name: Checkout
      uses: actions/checkout@v2

    - name: Checkout py3c
      uses: actions/checkout@v2
      with:
        repository: encukou/py3c
        ref: 'v1.3.1'
        path: py3c

    - name: Build and run tests
      run: |
        set -x

        ldflags="-L$HOME/svn/lib -Wl,-rpath,$HOME/svn/lib"
        case "$MATRIX_OS" in
          ubuntu-*)
            case "$MATRIX_PYVER" in
              2.*) swig=swig3.0 ;;
              *)   swig=swig4.0 ;;
            esac
            sudo apt-get install -qq -y libapr1-dev libaprutil1-dev liblz4-dev libutf8proc-dev "$swig"
            with_apr=/usr/bin/apr-1-config
            with_apr_util=/usr/bin/apu-1-config
            with_swig="/usr/bin/$swig"
            ;;
          macos-*)
            case "$MATRIX_PYVER" in
              2.*) swig='swig@3' ;;
              *)   swig='swig'   ;;
            esac
            brew update
            brew install apr apr-util lz4 utf8proc "$swig"
            with_apr="$(brew --prefix apr)/libexec/bin/apr-1-config"
            with_apr_util="$(brew --prefix apr-util)/libexec/bin/apu-1-config"
            with_swig="$(brew --prefix "$swig")/bin/swig"
            ;;
        esac

        PATH="$HOME/svn/bin:$PATH"
        export PATH
        /bin/sh autogen.sh
        mkdir -p subversion/bindings/swig/proxy || :
        installed_libs="$(cd "$HOME/svn/lib" && \
                          echo libsvn_*.la | \
                          sed -e 's/-[^-]*\.la//g; s/ /,/g')"
        python gen-make.py --installed-libs="$installed_libs"
        ./configure --prefix="$HOME/svn" \
                    --with-apr="$with_apr" \
                    --with-apr-util="$with_apr_util" \
                    --with-swig="$with_swig" \
                    --with-py3c="$GITHUB_WORKSPACE/py3c" \
                    --without-jdk \
                    --without-junit \
                    --without-apxs \
                    --without-doxygen \
                    --without-berkeley-db \
                    --without-gpg-agent \
                    --without-gnome-keyring \
                    --without-kwallet \
                    LDFLAGS="$ldflags"
        make -j3 swig-py
        make check-swig-py

    - name: Upload log files
      uses: actions/upload-artifact@v2
      if: always()
      with:
        name: log-python-${{ matrix.python-version }}-${{ matrix.os }}
        path: '*.log'


  posix-test-ruby:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ruby-version: ['3.0', '2.7', '2.6', '2.5', '2.4']

    needs: posix-prepare

    env:
      MATRIX_OS: ${{ matrix.os }}

    steps:
    - name: Set up libraries
      uses: actions/cache@v2
      with:
        path: ~/svn
        key: ${{ runner.os }}-${{ github.sha }}

    - name: Set up Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}

    - name: Checkout
      uses: actions/checkout@v2

    - name: Build and run tests
      run: |
        set -x

        cflags=
        ldflags="-L$HOME/svn/lib -Wl,-rpath,$HOME/svn/lib"
        case "$MATRIX_OS" in
          ubuntu-*)
            sudo apt-get install -qq -y libapr1-dev libaprutil1-dev liblz4-dev libutf8proc-dev swig
            with_apr=/usr/bin/apr-1-config
            with_apr_util=/usr/bin/apu-1-config
            with_swig=/usr/bin/swig
            ;;
          macos-*)
            brew update
            brew install apr apr-util lz4 utf8proc swig
            with_apr="$(brew --prefix apr)/libexec/bin/apr-1-config"
            with_apr_util="$(brew --prefix apr-util)/libexec/bin/apu-1-config"
            with_swig="$(brew --prefix swig)/bin/swig"
            cflags="-fdeclspec"
            ldflags="$ldflags -L$(ruby -rrbconfig -W0 -e "print RbConfig::CONFIG['libdir']")"
            ;;
        esac

        PATH="$HOME/svn/bin:$PATH"
        export PATH
        /bin/sh autogen.sh
        mkdir -p subversion/bindings/swig/proxy || :
        installed_libs="$(cd "$HOME/svn/lib" && \
                          echo libsvn_*.la | \
                          sed -e 's/-[^-]*\.la//g; s/ /,/g')"
        python gen-make.py --installed-libs="$installed_libs"
        ./configure --prefix="$HOME/svn" \
                    --with-apr="$with_apr" \
                    --with-apr-util="$with_apr_util" \
                    --with-swig="$with_swig" \
                    --without-py3c \
                    --without-jdk \
                    --without-junit \
                    --without-apxs \
                    --without-doxygen \
                    --without-berkeley-db \
                    --without-gpg-agent \
                    --without-gnome-keyring \
                    --without-kwallet \
                    CFLAGS="$cflags" LDFLAGS="$ldflags"
        make -j3 swig-rb
        make check-swig-rb

    - name: Upload log files
      uses: actions/upload-artifact@v2
      if: always()
      with:
        name: log-ruby-${{ matrix.ruby-version }}-${{ matrix.os }}
        path: '*.log'


  posix-test-perl:
